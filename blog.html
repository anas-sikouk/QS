<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Assurance Annacer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #05070a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>
    <!-- Navbar (Copiée de l'index pour cohérence) -->
    <nav class="fixed w-full z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto glass rounded-2xl px-8 py-4 flex justify-between items-center">
            <div class="text-2xl font-extrabold tracking-tighter">ANNACER<span class="text-blue-500">.</span></div>
            <div class="hidden md:flex space-x-8 font-medium">
                <a href="index.html" class="hover:text-blue-400 transition">Accueil</a>
                <a href="services.html" class="hover:text-blue-400 transition">Services</a>
                <a href="blog.html" class="text-blue-400 font-bold">Blog</a>
                <a href="contact.html" class="px-5 py-2 bg-blue-600 rounded-lg hover:bg-blue-700 transition">Contact</a>
            </div>
            <button id="btn-open" class="md:hidden text-white"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7" stroke-width="2" stroke-linecap="round"/></svg></button>
        </div>
    </nav>

    <!-- Overlay Menu Mobile -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] bg-black/90 backdrop-blur-xl hidden flex-col justify-center items-center space-y-8 text-2xl transition-all">
        <button id="btn-close" class="absolute top-8 right-8 text-gray-400 text-3xl">✕</button>
        <a href="index.html">Accueil</a>
        <a href="services.html">Services</a>
        <a href="blog.html" class="text-blue-500">Blog</a>
        <a href="contact.html">Contact</a>
    </div>

    <section class="pt-32 pb-20 px-6">
        <div class="max-w-7xl mx-auto">
            <h1 class="text-5xl font-extrabold mb-12 reveal">L'Actualité <span class="text-blue-500">Protection 3.0</span></h1>
            <div class="grid md:grid-cols-3 gap-8">
                <article class="glass p-8 rounded-3xl reveal border-l-4 border-blue-500">
                    <span class="text-sm text-blue-500 font-bold">IA & ASSURANCE</span>
                    <h2 class="text-2xl font-bold mt-4 mb-4">Comment l'IA simplifie vos sinistres à Sidi Kacem</h2>
                    <p class="text-gray-400">Découvrez l'efficacité de nos nouveaux outils automatisés.</p>
                </article>
                <!-- Ajoutez plus d'articles ici -->
            </div>
        </div>
    </section>

    <script>
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
        });
        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        const menu = document.getElementById('mobile-menu');
        document.getElementById('btn-open').onclick = () => menu.classList.remove('hidden');
        document.getElementById('btn-close').onclick = () => menu.classList.add('hidden');
    </script>
</body>
</html>
