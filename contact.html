<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Assurance Annacer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
</head>
<body class="bg-[#05070a] text-white pt-32 px-6">
    <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-16 items-center">
        <div>
            <h1 class="text-6xl font-extrabold mb-6">Parlons de votre <span class="text-blue-500">sécurité</span>.</h1>
            <div class="space-y-6 text-xl text-gray-400">
                <p>📍 Sidi Kacem, Maroc</p>
                <p>📧 annacer.assurance@gmail.com</p>
                <p>🏢 Partenaire AtlantaSanad</p>
            </div>
        </div>

        <form id="contact-form" class="bg-white/5 p-10 rounded-[2.5rem] border border-white/10 space-y-6">
            <input type="text" name="user_name" placeholder="Nom" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-blue-500">
            <input type="email" name="user_email" placeholder="Email" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-blue-500">
            <textarea name="message" placeholder="Votre message" rows="4" required class="w-full p-4 rounded-xl bg-white/5 border border-white/10 outline-none focus:border-blue-500"></textarea>
            <button type="submit" class="w-full py-4 bg-blue-600 rounded-xl font-bold hover:bg-blue-700 transition">Envoyer le message</button>
        </form>
    </div>

    <script>
        (function() { emailjs.init("VOTRE_PUBLIC_KEY"); })();
        document.getElementById('contact-form').onsubmit = function(e) {
            e.preventDefault();
            emailjs.sendForm('VOTRE_SERVICE_ID', 'VOTRE_TEMPLATE_ID', this)
                .then(() => alert('Succès ! Nous vous répondrons rapidement.'), 
                      (err) => alert('Échec de l\'envoi...'));
        };
    </script>
</body>
</html>
